<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pléroma — RPG</title>
<style>
  :root{
    --bg:#14110f; --panel:#1e1916; --panel2:#262019; --ink:#ece4da;
    --muted:#9a8d7e; --accent:#c2843a; --accent2:#e0a85a;
    --good:#7bbf6a; --bad:#d35b5b; --line:#3a2f25;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.55 "Iowan Old Style","Palatino Linotype",Georgia,serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:1080px; margin:0 auto; padding:0 16px 40px;}
  /* Topbar */
  .topbar{
    display:flex; align-items:center; gap:12px; padding:12px 4px;
    border-bottom:1px solid var(--line); margin-bottom:16px;
  }
  .topbar .brand{font-weight:700; letter-spacing:2px; color:var(--accent2); flex:1;}
  .topbar .lbl-lang{font-size:12px; color:var(--muted);}
  .topbar .sel-lang{
    background:var(--panel2); color:var(--ink); border:1px solid var(--line);
    padding:5px 8px; border-radius:6px; font-size:13px; cursor:pointer;
  }
  .topbar .sel-lang:hover{border-color:var(--accent);}
  .topbar button{
    background:var(--panel2); color:var(--ink); border:1px solid var(--line);
    padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px;
  }
  .topbar button:hover{border-color:var(--accent);}
  /* Layout */
  .layout{display:grid; grid-template-columns:1fr 280px; gap:18px;}
  @media(max-width:820px){ .layout{grid-template-columns:1fr;} }
  /* Story panel */
  #story{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:22px 26px; min-height:200px;
  }
  #story h1{font-size:38px; letter-spacing:6px; color:var(--accent2); margin:.2em 0;}
  #story h2{color:var(--accent2); border-bottom:1px solid var(--line); padding-bottom:6px;}
  /* Sprites opcionales (si el archivo no existe, el <img> se quita solo) */
  .sprite{display:block; max-width:100%; height:auto; image-rendering:auto;}
  .spr-zone{
    width:100%; max-height:240px; object-fit:cover; border-radius:8px;
    border:1px solid var(--line); margin:0 0 14px;
  }
  .spr-enemy{
    max-width:180px; margin:4px auto 12px; border-radius:8px;
    image-rendering:pixelated;
  }
  .spr-npc{
    float:right; width:120px; margin:0 0 10px 14px; border-radius:8px;
    border:1px solid var(--line); background:var(--panel2);
  }
  @media(max-width:600px){ .spr-npc{ width:90px; } .spr-enemy{ max-width:130px; } }
  #story .tag{color:var(--muted); font-style:italic;}
  #story input[type=text]{
    background:var(--panel2); border:1px solid var(--line); color:var(--ink);
    padding:8px 10px; border-radius:6px; font-size:16px; width:60%;
  }
  .hint{color:var(--muted); font-size:13px; font-style:italic;}
  .npcline{color:var(--accent2); font-style:italic; border-left:2px solid var(--line); padding-left:10px;}
  /* Actions */
  #actions{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px;}
  .act{
    background:var(--panel2); color:var(--ink); border:1px solid var(--line);
    padding:10px 16px; border-radius:8px; cursor:pointer; font-size:15px;
    transition:.15s;
  }
  .act:hover:not(:disabled){border-color:var(--accent); background:#2e251c;}
  .act:disabled{opacity:.4; cursor:not-allowed;}
  .act.primary{background:var(--accent); color:#1a120a; border-color:var(--accent2); font-weight:600;}
  .act.primary:hover:not(:disabled){background:var(--accent2);}
  .act.devour{background:#5a2030; border-color:#8a3045; color:#f0c0c8;}
  .act.devour:hover:not(:disabled){background:#7a2840;}
  .act.feast{background:#3a2a5a; border-color:#5a3f8a; color:#dcc8f0;}
  .act.feast:hover:not(:disabled){background:#4a356f;}
  .act.magia{background:#2a1a4a; border-color:#4a2f7a; color:#c8b0e8;}
  .act.magia:hover:not(:disabled){background:#3a2560;}
  /* Misiones / quests */
  .quest-block{margin:8px 0; padding:10px 12px; background:var(--panel2); border:1px solid var(--line); border-radius:8px;}
  .quest-title{font-weight:600; color:var(--accent2); margin-bottom:3px;}
  .quest-desc{font-size:13px; color:var(--muted); margin-bottom:6px;}
  .quest-bar-wrap{display:flex; align-items:center; gap:8px;}
  .quest-bar{flex:1; background:#0d0a08; border:1px solid var(--line); border-radius:4px; height:8px; overflow:hidden;}
  .quest-bar-fill{height:100%; background:var(--accent); transition:width .3s;}
  .quest-prog{font-size:12px; color:var(--muted); white-space:nowrap;}
  .quest-done{color:var(--good); font-size:13px;}
  .quest-locked{color:var(--muted); font-size:13px; font-style:italic;}
  /* Sección de hechizos en tienda */
  .spellsect{margin-top:16px; border-top:1px solid var(--line); padding-top:12px;}
  .spellsect h3{color:var(--accent2); margin:0 0 8px; font-size:15px;}
  .spellrow{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line);}
  .spellname{font-weight:600; min-width:160px; color:#c8b0e8;}
  .spellinfo{flex:1; color:var(--muted); font-size:13px;}
  .spellbuy{background:#2a1a4a; color:#c8b0e8; border:1px solid #4a2f7a; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:600;}
  .spellbuy:hover:not(:disabled){background:#3a2560;}
  .spellbuy:disabled{opacity:.4; cursor:not-allowed;}
  /* Sidebar */
  #sidebar{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:16px; font-size:14px; align-self:start;
  }
  .char-name{font-size:20px; font-weight:700; color:var(--accent2);}
  .char-sub{color:var(--muted); margin-bottom:12px; font-size:13px;}
  .bar-wrap{margin:8px 0;}
  .bar-label{display:flex; justify-content:space-between; font-size:12px; color:var(--muted);}
  .bar{background:#0d0a08; border:1px solid var(--line); border-radius:5px; height:12px; overflow:hidden;}
  .bar-fill{height:100%; transition:width .3s;}
  .bar-fill.vida{background:#c0413f;}
  .bar-fill.llenura{background:#c2843a;}
  .bar-fill.stamina{background:#cfcfcf;}
  .bar-fill.mana{background:#4a78c0;}
  .bar-fill.xp{background:#7bbf6a;}
  .bar-fill.enemigo{background:#a03a3a;}
  .stats-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin:12px 0;}
  .stat{background:var(--panel2); border-radius:5px; padding:4px 6px; text-align:center; font-size:13px;}
  .stat b{color:var(--accent2);}
  .body{margin-top:10px; font-size:13px; line-height:1.7;}
  .body b{color:var(--ink);}
  .body .subline{font-size:11px; color:var(--muted); margin:-3px 0 2px;}
  .warn{color:var(--accent2); font-style:italic; font-size:12px; margin-top:6px;}
  .purse{margin-top:8px; font-size:13px; color:var(--muted);}
  .purse b{color:var(--accent2);}
  /* Log */
  #logwrap{margin-top:18px;}
  #logwrap .lhdr{color:var(--muted); font-size:12px; letter-spacing:1px; text-transform:uppercase;}
  #log{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px 16px; max-height:220px; overflow-y:auto; margin-top:6px; font-size:14px;
  }
  .logline{padding:2px 0; border-bottom:1px solid rgba(255,255,255,.04);}
  .logline.bien{color:var(--good);}
  .logline.mal{color:var(--bad);}
  .logline.combate{color:var(--accent2);}
  .logline.comida{color:#d8a86a; font-style:italic;}
  .logline.devour{color:#e88aa0; font-weight:600;}
  /* Character creation */
  .spgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:14px 0;}
  @media(max-width:600px){ .spgrid{grid-template-columns:1fr;} }
  .spcard{background:var(--panel2); border:2px solid var(--line); border-radius:8px; padding:12px; cursor:pointer; transition:.15s;}
  .spcard:hover{border-color:var(--accent);}
  .spcard.sel{border-color:var(--accent2); background:#2e251c;}
  .spcard.custom{border-style:dashed;}
  #story input.pron{min-width:0; width:5.5em; text-align:center;}
  #story label{color:var(--muted); font-size:13px;}
  .spcard b{color:var(--accent2);}
  .spdesc{font-size:13px; color:var(--muted); margin:4px 0;}
  .spstats{font-size:12px; font-family:monospace; color:var(--ink);}
  .ptgrid{margin:14px 0;}
  .ptrow{display:flex; align-items:center; gap:12px; padding:6px 0; border-bottom:1px solid var(--line);}
  .ptname{flex:1;}
  .ptbtn,.ptup,.hbtn{background:var(--panel2); border:1px solid var(--line); color:var(--ink); width:34px; height:30px; border-radius:6px; cursor:pointer; font-size:16px;}
  .ptbtn:hover,.ptup:hover,.hbtn:hover{border-color:var(--accent);}
  .ptval{min-width:24px; text-align:center; color:var(--accent2);}
  .ptdesc{display:block; font-size:11px; color:var(--muted); margin-top:2px; font-style:italic; font-weight:normal;}
  /* Save/load slots */
  .savelist{margin:10px 0;}
  .saveslot{display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--line);}
  .slotnum{min-width:72px; font-size:13px; color:var(--muted); flex-shrink:0;}
  .slotinfo{flex:1; font-size:14px;}
  .infotip{color:var(--accent2); cursor:help; font-size:14px;}
  /* Inventory / shop */
  .invlist,.shoplist{margin:12px 0;}
  .invrow,.shoprow{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line);}
  .invname,.shopname{font-weight:600; min-width:160px;}
  .invinfo{flex:1; color:var(--muted); font-size:13px;}
  .invuse,.shopbuy{background:var(--accent); color:#1a120a; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:600;}
  .invuse:hover,.shopbuy:hover:not(:disabled){background:var(--accent2);}
  .shopbuy:disabled{opacity:.4; cursor:not-allowed; background:var(--panel2); color:var(--muted);}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="brand">✦ PLÉROMA</span>
    <label id="lblLang" class="lbl-lang" for="selLang">Idioma:</label>
    <select id="selLang" class="sel-lang"></select>
    <button id="btnLangUpload" class="sel-lang" title="Subir tu propio idioma (.js)">＋</button>
    <input id="inpLangFile" type="file" accept=".js,text/javascript" style="display:none">
    <button id="btnUnidades">Métrico</button>
    <button id="btnCheats">Cheats</button>
    <button id="btnGuardar">Guardar</button>
    <button id="btnMenu">Menú</button>
  </div>

  <div class="layout">
    <div class="main">
      <div id="story"></div>
      <div id="actions"></div>
    </div>
    <div id="sidebar"></div>
  </div>

  <div id="logwrap">
    <div class="lhdr" id="lblLog"></div>
    <div id="log"></div>
  </div>
</div>

<!-- DATA de contenido (define window.GD) -->
<script src="data/species.js"></script>
<script src="data/items.js"></script>
<script src="data/enemies.js"></script>
<script src="data/world.js"></script>
<script src="data/bodies.js"></script>
<script src="data/npcs.js"></script>
<script src="data/npcWG.js"></script>
<script src="data/spells.js"></script>
<script src="data/miniEventos.js"></script>
<!-- IDIOMAS (uno por archivo) + capa i18n -->
<script src="data/lang/es.js"></script>
<script src="data/lang/en.js"></script>
<script src="i18n.js"></script>
<!-- Motor (engine.js dividido por dominio · cargar en orden) -->
<script src="engine/01_core.js"></script>
<script src="engine/02_body.js"></script>
<script src="engine/03_systems.js"></script>
<script src="engine/04_render.js"></script>
<script src="engine/05_charcreation.js"></script>
<script src="engine/06_exploration.js"></script>
<script src="engine/07_screens.js"></script>
<script src="engine/08_town.js"></script>
<script src="engine/09_npcwg.js"></script>
<script src="engine/10_magic_quests.js"></script>
<script src="engine/11_combat.js"></script>
<script src="engine/12_endgame.js"></script>
</body>
</html>
